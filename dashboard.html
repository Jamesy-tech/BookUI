* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Google Sans Flex", sans-serif;
}

body {

    background: var(--bg-color);
    color: var(--text-color);
    display: flex;
    height: 100vh;
    overflow: hidden;

}

* {
    cursor: url("https://raw.githubusercontent.com/Jamesy-tech/BookUI/main/cursor.png"), auto !important;

.sidebar {
    width: 250px;
    background: var(--panel-color);
    border-right: 1px solid var(--border-color);
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 10px;
}

.sidebar h2 {
    color: var(--primary-color);
    font-size: 20px;
    margin-bottom: 10px;
}

.nav-item {
    padding: 10px;
    border: 1px solid var(--border-color);
    transition: 0.15s;
    text-transform: capitalize;
}

.nav-item:hover, .nav-item.active {
    border-color: var(--primary-color);
    background: #ffffff05;
}

.main {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow-y: auto;
}

.topbar {
    height: 70px;
    min-height: 70px;
    background: var(--panel-color);
    border-bottom: 1px solid var(--border-color);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px;
    position: sticky;
    top: 0;
    z-index: 10;
    padding-right:25px;
}

.topbar .title {
    color: var(--primary-color);
    font-size: 20px;
    font-weight: bold;
}

.topbar .actions {
    display: flex;
    gap: 20px;
}

.topbar .actions a {
    color: white;
    text-decoration: none;
    transition: 0.15s;
    font-size: 16px;
}

.topbar .actions a:hover {
    color: var(--primary-color);
}

.content {
    padding: 20px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 20px;
}

.card {
    background: var(--panel-color);
    border: 1px solid var(--border-color);
    padding: 20px;
    transition: 0.2s ease;
    display: flex;
    flex-direction: column;
    gap: 10px;
}

.card:hover {
    border-color: var(--primary-color);
}

.card h3 {
    color: var(--primary-color);
    font-size: 22px;
}

.card p {
    color: var(--muted-color);
    font-size: 16px;
    line-height: 1.5;
}

.btn {
    background: var(--primary-color);
    color: white;
    border: none;
    padding: 8px 12px;
    font-size: 12px;
    margin-top: auto;
    width: fit-content;
}

#version-text {
    padding-left:2px;

function addLog(type, args) {
    const msg = args.map(a => 
        typeof a === "object" ? JSON.stringify(a) : a
    ).join(" ");

    logs.push({ type, msg });

    if (currentPage === "logs") renderLogs();
}

const originalLog = console.log;
const originalError = console.error;
const originalWarn = console.warn;

console.log = (...args) => {
    originalLog(...args);
    addLog("log", args);
};

console.error = (...args) => {
    originalError(...args);
    addLog("error", args);
};

console.warn = (...args) => {
    originalWarn(...args);
    addLog("warn", args);
};

    const suggestion = prompt("What would you like us to add?");
    if (!suggestion) return;

    const email = prompt("Enter your email (optional):") || "Not provided";

    const confirmSend = confirm("Submit suggestion?");
    if (!confirmSend) return;

    const message = {
        content: "**Command Suggestion**\n*from BookUI+ Dashboard*\nSuggestion: " + suggestion + "\nEmail: " + email
    };

    fetch(webhookURL, {
        method: "POST",
        headers: {
            "Content-Type": "application/json"

}

function renderLogs() {
    const container = document.getElementById('main-content');
    container.innerHTML = '';

    logs.slice().reverse().forEach(log => {
        const div = document.createElement('div');
        div.className = 'card';

        div.innerHTML = `
            <h3>${log.type.toUpperCase()}</h3>
            <p>${log.msg}</p>
        `;

        container.appendChild(div);
    });
}

function verifyScripts() {
    window.location.href = "https://jamesy-tech.github.io/protect/index.html?from=scripts&redirect=https://jamesy-tech.github.io/BookUI/dashboard.html?page=jamscripts";
}

function switchPage(pageKey) {

     currentPage = pageKey;

    document.getElementById('page-title').textContent = pageKey.charAt(0).toUpperCase() + pageKey.slice(1);
    
    document.querySelectorAll('.nav-item').forEach(item => {
        item.classList.remove('active');
        if(item.textContent.toLowerCase() === pageKey) item.classList.add('active');
    });

    const container = document.getElementById('main-content');
    container.innerHTML = ''; 

    if (pageKey === "scripts_verify") {
    verifyScripts();
    }

    if (pageKey === "logs") {
    renderLogs();
    return;

}

   pages[pageKey].forEach(card => {
    const cardDiv = document.createElement('div');
    cardDiv.className = 'card';

    cardDiv.innerHTML = `
        <h3>${card.title}</h3>
        <p>${card.desc}</p>
    `;

    if (card.command) {
        cardDiv.style.cursor = "pointer";

        cardDiv.addEventListener("click", () => {
            card.command();
        });
    }

    container.appendChild(cardDiv);
});
}

const data = { name: "BookUI+", version: "V0.0" };

async function updateVersionFromGithub() {
    try {
        const repo = "Jamesy-tech/BookUI";
        const response = await fetch(`https://api.github.com/repos/${repo}/commits?per_page=1`);
        const linkHeader = response.headers.get('Link');
        if (linkHeader) {
            console.log(linkHeader);
            const match = linkHeader.match(/page=(\d+)>; rel="last"/);
            if (match) {
                const totalCommits = parseInt(match[1]);
                data.version = `V${(totalCommits * 0.1).toFixed(1)}`;
                document.getElementById("version-text").textContent = `${data.name} ${data.version}`;
                console.log(linkHeader);
            }
        }
    } catch (err) {
        console.error("Version fetch failed", err);
    }
}

function switchTheme(theme) {
    
  if (theme === "loadTheme") {
    const saved = localStorage.getItem("theme");
    if (saved) switchTheme(saved);
    return;
  }

  document.body.classList.forEach(cls => {
    if (cls.startsWith("theme-")) document.body.classList.remove(cls);
  });
  if (theme) {
    document.body.classList.add(`theme-${theme}`);
    localStorage.setItem("theme", theme);
  } else {
    localStorage.removeItem("theme");
  }
}

window.onerror = function(message, source, lineno, colno, error) {

};

window.addEventListener("DOMContentLoaded", () => switchTheme("loadTheme"));
